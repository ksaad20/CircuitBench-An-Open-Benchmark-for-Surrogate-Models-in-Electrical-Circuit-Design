target-version = "py310"
line-length = 100

[lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
ignore = [
    "BLE001",  # Blind except - used intentionally for graceful degradation
    "B905",    # zip() strict= - not enforced in this codebase
]

[lint.per-file-ignores]
"tests/**" = ["PLW1510", "S101", "ANN"]
"test_*.py" = ["PLW1510", "S101", "ANN"]
