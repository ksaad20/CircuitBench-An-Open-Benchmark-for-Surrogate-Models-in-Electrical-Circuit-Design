
name: CircuitBench CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ────────────────────────────────
  # 1. Lint, Format & Security
  # ────────────────────────────────
  lint-and-security:
    name: lint & security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint & security tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit pip-audit

      - name: Black formatting check
        run: black --check --diff .

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Type check with mypy
        run: mypy --ignore-missing-imports --show-error-codes .

      - name: Security scan with bandit
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Dependency vulnerability scan
        run: pip-audit --desc || true

  # ────────────────────────────────
  # 2. Test Suite (Matrix)
  # ────────────────────────────────
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then pip install -e .; fi

      - name: Verify package imports (smoke test)
        run: |
          python -c "import circuitbench; print('circuitbench imported OK')"
        continue-on-error: true

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=circuitbench --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ────────────────────────────────
  # 3. Build Verification
  # ────────────────────────────────
  build:
    name: build verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine check-wheel-contents

      - name: Build wheel & sdist
        run: python -m build

      - name: Check wheel contents
        run: check-wheel-contents dist/*.whl

      - name: Twine check
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ────────────────────────────────
  # 4. Integration / Dataset Check
  # ────────────────────────────────
  integration:
    name: integration check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then pip install -e .; fi

      - name: Check dataset availability
        run: |
          python -c "
          import os, sys
          for d in ['data', 'datasets', 'benchmark_data', 'circuitbench/data']:
              if os.path.isdir(d):
                  print(f'Found data dir: {d}')
                  sys.exit(0)
          print('No data directory found — verify dataset setup')
          "
        continue-on-error: true

      - name: Run benchmark smoke test
        run: |
          python -c "
          try:
              from circuitbench import evaluate
              print('evaluate() available')
          except ImportError as e:
              print(f'Import warning: {e}')
          "
        continue-on-error: true
